<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Study Assistant</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            background:#020617;

            color:white;

            height:100vh;

            overflow:hidden;

            display:flex;
        }

        /* ========================= */
        /* LEFT SECTION */
        /* ========================= */

        .summary-section{

            flex:1;

            overflow-y:auto;

            padding:35px;
        }

        .summary-box{

            min-height:100%;

            background:
            linear-gradient(
                145deg,
                rgba(15,23,42,0.95),
                rgba(30,41,59,0.95)
            );

            border:1px solid rgba(255,255,255,0.06);

            border-radius:28px;

            padding:35px;

            box-shadow:
            0 10px 40px rgba(0,0,0,0.4);
        }

        .top-bar{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-bottom:30px;
        }

        .title{

            font-size:42px;

            font-weight:700;

            background:linear-gradient(
                to right,
                #c084fc,
                #60a5fa
            );

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;
        }

        .tag{

            background:#1e293b;

            padding:10px 18px;

            border-radius:999px;

            font-size:14px;

            color:#93c5fd;
        }

        .summary-content{

            background:#0f172a;

            padding:30px;

            border-radius:24px;

            border:1px solid rgba(255,255,255,0.05);

            line-height:2;

            font-size:16px;

            white-space:pre-wrap;

            overflow-x:auto;
        }

        /* ========================= */
        /* BUTTONS */
        /* ========================= */

        .button-row{

            margin-top:35px;

            display:flex;

            gap:20px;

            flex-wrap:wrap;
        }

        .btn{

            border:none;

            padding:16px 28px;

            border-radius:16px;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;
        }

        .primary{

            background:linear-gradient(
                135deg,
                #7c3aed,
                #2563eb
            );

            color:white;

            box-shadow:
            0 10px 30px rgba(37,99,235,0.35);
        }

        .secondary{

            background:#111827;

            color:white;

            border:1px solid rgba(255,255,255,0.06);
        }

        .btn:hover{

            transform:translateY(-3px);
        }

        /* ========================= */
        /* CHATBOT */
        /* ========================= */

        .chat-section{

            width:420px;

            background:#081127;

            border-left:1px solid rgba(255,255,255,0.06);

            display:flex;

            flex-direction:column;

            height:100vh;
        }

        .chat-header{

            padding:25px;

            border-bottom:1px solid rgba(255,255,255,0.06);

            display:flex;

            align-items:center;

            gap:15px;
        }

        .avatar{

            width:58px;

            height:58px;

            border-radius:18px;

            background:linear-gradient(
                135deg,
                #7c3aed,
                #2563eb
            );

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:28px;
        }

        .chat-header h2{

            font-size:30px;

            font-weight:600;
        }

        .chat-box{

            flex:1;

            overflow-y:auto;

            padding:20px;
        }

        .message{

            margin-bottom:18px;

            padding:16px;

            border-radius:18px;

            line-height:1.8;

            font-size:15px;

            animation:fadeIn 0.3s ease;
        }

        .user{

            background:#2563eb;

            margin-left:50px;
        }

        .bot{

            background:#1e293b;

            margin-right:50px;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* ========================= */
        /* INPUT */
        /* ========================= */

        .input-area{

            padding:20px;

            border-top:1px solid rgba(255,255,255,0.06);

            display:flex;

            gap:12px;
        }

        .input-area input{

            flex:1;

            padding:16px;

            border:none;

            border-radius:16px;

            background:#111827;

            color:white;

            outline:none;

            font-size:15px;
        }

        .send-btn{

            background:linear-gradient(
                135deg,
                #7c3aed,
                #2563eb
            );

            border:none;

            color:white;

            padding:16px 22px;

            border-radius:16px;

            cursor:pointer;

            font-weight:600;
        }

        /* ========================= */
        /* SCROLLBAR */
        /* ========================= */

        ::-webkit-scrollbar{
            width:8px;
        }

        ::-webkit-scrollbar-thumb{
            background:#334155;
            border-radius:20px;
        }

        /* ========================= */
        /* MOBILE */
        /* ========================= */

        @media(max-width:1100px){

            body{
                flex-direction:column;
                overflow:auto;
            }

            .chat-section{
                width:100%;
                height:600px;
            }
        }

    </style>

</head>

<body>

    <!-- ========================= -->
    <!-- SUMMARY -->
    <!-- ========================= -->

    <div class="summary-section">

        <div class="summary-box">

            <div class="top-bar">

                <h1 class="title">
                    📄 AI Summary
                </h1>

                <div class="tag">
                    AI Powered
                </div>

            </div>

            <div class="summary-content">

                {{ ai_result }}

            </div>

            <div class="button-row">

                <a href="/test">

                    <button class="btn primary">

                        🚀 Start Test

                    </button>

                </a>

                <a href="/">

                    <button class="btn secondary">

                        📂 Upload Another PDF

                    </button>

                </a>

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- CHATBOT -->
    <!-- ========================= -->

    <div class="chat-section">

        <div class="chat-header">

            <div class="avatar">
                🤖
            </div>

            <h2>AI Tutor</h2>

        </div>

        <div class="chat-box" id="chat-box">

        </div>

        <div class="input-area">

            <input
                type="text"
                id="user-input"
                placeholder="Ask doubts from PDF..."
            >

            <button
                class="send-btn"
                onclick="sendMessage()"
            >
                Send
            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- JS -->
    <!-- ========================= -->

    <script>

    async function sendMessage(){

        let input =
        document.getElementById("user-input");

        let message = input.value;

        if(message.trim() === ""){
            return;
        }

        let chatBox =
        document.getElementById("chat-box");

        // =========================
        // USER MESSAGE
        // =========================

        chatBox.innerHTML += `

            <div class="message user">
                ${message}
            </div>

        `;

        input.value = "";

        chatBox.scrollTop =
        chatBox.scrollHeight;

        // =========================
        // TYPING ANIMATION
        // =========================

        let typingId =
        "typing-" + Date.now();

        chatBox.innerHTML += `

            <div
                class="message bot typing"
                id="${typingId}"
            >

                <span></span>
                <span></span>
                <span></span>

            </div>

        `;

        chatBox.scrollTop =
        chatBox.scrollHeight;

        // =========================
        // FETCH AI RESPONSE
        // =========================

        try{

            let response = await fetch("/chat",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    message:message
                })

            });

            let data = await response.json();

            // REMOVE TYPING

            document
            .getElementById(typingId)
            .remove();

            // =========================
            // BOT MESSAGE
            // =========================

            chatBox.innerHTML += `

                <div class="message bot">
                    ${data.reply}
                </div>

            `;

            chatBox.scrollTop =
            chatBox.scrollHeight;

        }

        catch(error){

            document
            .getElementById(typingId)
            .remove();

            chatBox.innerHTML += `

                <div class="message bot">
                    ⚠️ Error generating response
                </div>

            `;
        }
    }

</script>
</body>
</html>
