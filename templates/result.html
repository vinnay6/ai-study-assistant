<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Study Assistant</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            background:#020617;

            color:white;

            min-height:100vh;

            display:flex;
        }

        /* ========================= */
        /* LEFT SECTION */
        /* ========================= */

        .summary-section{

            flex:1;

            overflow-y:auto;

            padding:35px;
        }

        .summary-box{

            min-height:100%;

            background:
            linear-gradient(
                145deg,
                rgba(15,23,42,0.95),
                rgba(30,41,59,0.95)
            );

            border:1px solid rgba(255,255,255,0.06);

            border-radius:28px;

            padding:35px;

            box-shadow:
            0 10px 40px rgba(0,0,0,0.4);
        }

        .top-bar{

            display:flex;

            justify-content:space-between;

            align-items:center;

            gap:20px;

            margin-bottom:30px;
        }

        .title{

            font-size:42px;

            font-weight:700;

            background:linear-gradient(
                to right,
                #c084fc,
                #60a5fa
            );

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;
        }

        .tag{

            background:#1e293b;

            padding:10px 18px;

            border-radius:999px;

            font-size:14px;

            color:#93c5fd;

            white-space:nowrap;
        }

        .summary-content{

            background:#0f172a;

            padding:30px;

            border-radius:24px;

            border:1px solid rgba(255,255,255,0.05);

            line-height:2;

            font-size:16px;

            white-space:pre-wrap;

            overflow-x:auto;
        }

        /* ========================= */
        /* BUTTONS */
        /* ========================= */

        .button-row{

            margin-top:35px;

            display:flex;

            gap:20px;

            flex-wrap:wrap;
        }

        .btn{

            border:none;

            padding:16px 28px;

            border-radius:16px;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;
        }

        .primary{

            background:linear-gradient(
                135deg,
                #7c3aed,
                #2563eb
            );

            color:white;

            box-shadow:
            0 10px 30px rgba(37,99,235,0.35);
        }

        .secondary{

            background:#111827;

            color:white;

            border:1px solid rgba(255,255,255,0.06);
        }

        .btn:hover{

            transform:translateY(-3px);
        }

        /* ========================= */
        /* CHATBOT */
        /* ========================= */

        .chat-section{

            width:420px;

            background:#081127;

            border-left:1px solid rgba(255,255,255,0.06);

            display:flex;

            flex-direction:column;

            height:100vh;
        }

        .chat-header{

            padding:25px;

            border-bottom:1px solid rgba(255,255,255,0.06);

            display:flex;

            align-items:center;

            gap:15px;
        }

        .avatar{

            width:58px;

            height:58px;

            border-radius:18px;

            background:linear-gradient(
                135deg,
                #7c3aed,
                #2563eb
            );

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:28px;

            flex-shrink:0;
        }

        .chat-header h2{

            font-size:30px;

            font-weight:600;
        }

        .chat-box{

            flex:1;

            overflow-y:auto;

            padding:20px;
        }

        .message{

            margin-bottom:18px;

            padding:16px;

            border-radius:18px;

            line-height:1.8;

            font-size:15px;

            word-wrap:break-word;

            animation:fadeIn 0.3s ease;
        }

        .user{

            background:#2563eb;

            margin-left:50px;
        }

        .bot{

            background:#1e293b;

            margin-right:50px;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* ========================= */
        /* INPUT */
        /* ========================= */

        .input-area{

            padding:20px;

            border-top:1px solid rgba(255,255,255,0.06);

            display:flex;

            gap:12px;
        }

        .input-area input{

            flex:1;

            padding:16px;

            border:none;

            border-radius:16px;

            background:#111827;

            color:white;

            outline:none;

            font-size:15px;
        }

        .send-btn{

            background:linear-gradient(
                135deg,
                #7c3aed,
                #2563eb
            );

            border:none;

            color:white;

            padding:16px 22px;

            border-radius:16px;

            cursor:pointer;

            font-weight:600;

            transition:0.3s;
        }

        .send-btn:hover{

            transform:translateY(-2px);
        }

        /* ========================= */
        /* SCROLLBAR */
        /* ========================= */

        ::-webkit-scrollbar{
            width:8px;
        }

        ::-webkit-scrollbar-thumb{
            background:#334155;
            border-radius:20px;
        }

        /* ========================= */
        /* TABLET */
        /* ========================= */

        @media(max-width:1100px){

            body{
                flex-direction:column;
            }

            .summary-section{
                padding:20px;
            }

            .chat-section{

                width:100%;

                height:600px;

                border-left:none;

                border-top:1px solid rgba(255,255,255,0.06);
            }

            .title{
                font-size:34px;
            }
        }

        /* ========================= */
        /* MOBILE */
        /* ========================= */

        @media(max-width:768px){

            body{
                overflow:auto;
            }

            .summary-section{
                padding:15px;
            }

            .summary-box{
                padding:20px;
                border-radius:20px;
            }

            .top-bar{

                flex-direction:column;

                align-items:flex-start;

                gap:15px;
            }

            .title{

                font-size:28px;

                line-height:1.3;
            }

            .summary-content{

                padding:20px;

                font-size:14px;

                line-height:1.8;
            }

            .button-row{

                flex-direction:column;
            }

            .button-row a{
                width:100%;
            }

            .btn{

                width:100%;

                font-size:15px;

                padding:15px;
            }

            .chat-section{

                height:500px;
            }

            .chat-header{

                padding:18px;
            }

            .chat-header h2{

                font-size:24px;
            }

            .avatar{

                width:50px;

                height:50px;

                font-size:24px;
            }

            .chat-box{

                padding:15px;
            }

            .message{

                font-size:14px;

                padding:14px;
            }

            .user{
                margin-left:15px;
            }

            .bot{
                margin-right:15px;
            }

            .input-area{

                flex-direction:column;

                padding:15px;
            }

            .input-area input{

                width:100%;
            }

            .send-btn{

                width:100%;

                padding:14px;
            }
        }

        /* ========================= */
        /* SMALL MOBILE */
        /* ========================= */

        @media(max-width:480px){

            .title{
                font-size:24px;
            }

            .summary-content{
                font-size:13px;
            }

            .chat-header h2{
                font-size:20px;
            }

            .message{
                font-size:13px;
            }
        }

    </style>

</head>
<body>

    <!-- YOUR EXISTING HTML SAME RAHEGA -->

</body>
</html>
