<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Study Assistant</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- EXTERNAL CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <!-- ========================= -->
    <!-- SUMMARY -->
    <!-- ========================= -->

    <div class="summary-section">

        <div class="summary-box">

            <div class="top-bar">

                <h1 class="title">
                    📄 AI Summary
                </h1>

                <div class="tag">
                    AI Powered
                </div>

            </div>

            <div class="summary-content">

                {{ ai_result }}

            </div>

            <div class="button-row">

                <a href="/test">

                    <button class="btn primary">

                        🚀 Start Test

                    </button>

                </a>

                <a href="/">

                    <button class="btn secondary">

                        📂 Upload Another PDF

                    </button>

                </a>

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- CHATBOT -->
    <!-- ========================= -->

    <div class="chat-section">

        <div class="chat-header">

            <div class="avatar">
                🤖
            </div>

            <h2>AI Tutor</h2>

        </div>

        <div class="chat-box" id="chat-box">

        </div>

        <div class="input-area">

            <input
                type="text"
                id="user-input"
                placeholder="Ask doubts from PDF..."
            >

            <button
                class="send-btn"
                onclick="sendMessage()"
            >
                Send
            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- JS -->
    <!-- ========================= -->

    <script>

    async function sendMessage(){

        let input =
        document.getElementById("user-input");

        let message = input.value;

        if(message.trim() === ""){
            return;
        }

        let chatBox =
        document.getElementById("chat-box");

        // USER MESSAGE

        chatBox.innerHTML += `

            <div class="message user">
                ${message}
            </div>

        `;

        input.value = "";

        chatBox.scrollTop =
        chatBox.scrollHeight;

        // TYPING

        let typingId =
        "typing-" + Date.now();

        chatBox.innerHTML += `

            <div
                class="message bot"
                id="${typingId}"
            >

                Typing...

            </div>

        `;

        chatBox.scrollTop =
        chatBox.scrollHeight;

        try{

            let response = await fetch("/chat",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    message:message
                })

            });

            let data = await response.json();

            document
            .getElementById(typingId)
            .remove();

            chatBox.innerHTML += `

                <div class="message bot">
                    ${data.reply}
                </div>

            `;

            chatBox.scrollTop =
            chatBox.scrollHeight;

        }

        catch(error){

            document
            .getElementById(typingId)
            .remove();

            chatBox.innerHTML += `

                <div class="message bot">
                    ⚠️ Error generating response
                </div>

            `;
        }
    }

    // ENTER KEY SUPPORT

    document
    .getElementById("user-input")
    .addEventListener("keypress", function(e){

        if(e.key === "Enter"){

            sendMessage();
        }
    });

    </script>

</body>
</html>
