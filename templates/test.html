<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Test</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            background:
            radial-gradient(circle at top,#1e1b4b,#020617);

            color:white;

            min-height:100vh;

            padding:40px;
        }

        .container{

            max-width:1100px;

            margin:auto;
        }

        /* ========================= */
        /* TOP BAR */
        /* ========================= */

        .top-bar{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-bottom:40px;

            flex-wrap:wrap;

            gap:20px;
        }

        .title{

            font-size:44px;

            font-weight:700;

            background:linear-gradient(
                to right,
                #c084fc,
                #60a5fa
            );

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;
        }

        .back-btn{

            text-decoration:none;

            color:white;

            background:#111827;

            padding:14px 22px;

            border-radius:16px;

            border:1px solid rgba(255,255,255,0.08);

            transition:0.3s;
        }

        .back-btn:hover{

            background:#1e293b;

            transform:translateY(-2px);
        }

        /* ========================= */
        /* FORM */
        /* ========================= */

        form{

            display:flex;

            flex-direction:column;

            gap:30px;
        }

        /* ========================= */
        /* QUESTION CARD */
        /* ========================= */

        .question-box{

            background:
            linear-gradient(
                145deg,
                rgba(15,23,42,0.95),
                rgba(30,41,59,0.95)
            );

            border:1px solid rgba(255,255,255,0.06);

            padding:32px;

            border-radius:26px;

            box-shadow:
            0 10px 35px rgba(0,0,0,0.35);

            transition:0.3s;
        }

        .question-box:hover{

            transform:translateY(-5px);
        }

        .question{

            font-size:24px;

            font-weight:600;

            margin-bottom:28px;

            line-height:1.6;

            color:#f8fafc;
        }

        /* ========================= */
        /* OPTIONS */
        /* ========================= */

        .option{

            display:flex;

            align-items:center;

            gap:16px;

            padding:18px 20px;

            margin-bottom:16px;

            border-radius:18px;

            background:#0f172a;

            border:1px solid rgba(255,255,255,0.05);

            cursor:pointer;

            transition:0.3s;
        }

        .option:hover{

            background:#1e293b;

            transform:translateX(6px);

            border-color:#7c3aed;
        }

        .option input[type="radio"]{

            width:20px;

            height:20px;

            accent-color:#8b5cf6;

            cursor:pointer;

            flex-shrink:0;
        }

        .option-text{

            font-size:17px;

            line-height:1.5;

            color:#e2e8f0;
        }

        /* ========================= */
        /* SUBMIT BUTTON */
        /* ========================= */

        .submit-btn{

            width:100%;

            border:none;

            padding:20px;

            border-radius:20px;

            font-size:22px;

            font-weight:700;

            cursor:pointer;

            color:white;

            background:
            linear-gradient(
                135deg,
                #7c3aed,
                #2563eb
            );

            transition:0.3s;

            margin-top:10px;

            box-shadow:
            0 12px 30px rgba(37,99,235,0.35);
        }

        .submit-btn:hover{

            transform:translateY(-4px) scale(1.01);

            box-shadow:
            0 16px 35px rgba(37,99,235,0.45);
        }

        .submit-btn:active{

            transform:scale(0.98);
        }

        /* ========================= */
        /* SCROLLBAR */
        /* ========================= */

        ::-webkit-scrollbar{

            width:8px;
        }

        ::-webkit-scrollbar-thumb{

            background:#334155;

            border-radius:20px;
        }

        /* ========================= */
        /* MOBILE */
        /* ========================= */

        @media(max-width:768px){

            body{

                padding:20px;
            }

            .title{

                font-size:32px;
            }

            .question{

                font-size:20px;
            }

            .question-box{

                padding:24px;
            }

            .option-text{

                font-size:15px;
            }

            .submit-btn{

                font-size:18px;
            }
        }

        /* ========================= */
/* EXTRA RESPONSIVE DESIGN */
/* ========================= */

@media(max-width:768px){

    body{

        padding:18px;

        overflow-x:hidden;
    }

    .container{

        width:100%;
    }

    .top-bar{

        flex-direction:column;

        align-items:flex-start;

        gap:18px;
    }

    .title{

        font-size:30px;

        line-height:1.3;
    }

    .back-btn{

        width:100%;

        text-align:center;

        padding:14px;
    }

    form{

        gap:22px;
    }

    .question-box{

        padding:20px;

        border-radius:20px;
    }

    .question{

        font-size:18px;

        line-height:1.5;

        margin-bottom:22px;
    }

    .option{

        padding:15px;

        gap:12px;

        border-radius:14px;

        align-items:flex-start;
    }

    .option input[type="radio"]{

        width:18px;

        height:18px;

        margin-top:2px;
    }

    .option-text{

        font-size:14px;

        line-height:1.5;
    }

    .submit-btn{

        font-size:18px;

        padding:16px;

        border-radius:16px;
    }
}

/* ========================= */
/* SMALL MOBILE */
/* ========================= */

@media(max-width:480px){

    body{

        padding:14px;
    }

    .title{

        font-size:24px;
    }

    .question{

        font-size:16px;
    }

    .question-box{

        padding:16px;
    }

    .option{

        padding:13px;
    }

    .option-text{

        font-size:13px;
    }

    .submit-btn{

        font-size:16px;

        padding:15px;
    }
}

    </style>

</head>

<body>

    <div class="container">

        <!-- TOP BAR -->

        <div class="top-bar">

            <h1 class="title">

                📝 AI Generated Test

            </h1>

            <a href="/dashboard" class="back-btn">

                ← Back to Dashboard

            </a>

        </div>

        <!-- TEST FORM -->

        <form action="/submit-test" method="POST">

            {% for mcq in mcqs %}

            {% set question_number = loop.index %}

            <div class="question-box">

                <h2 class="question">

                    Q{{ question_number }}.
                    {{ mcq.question }}

                </h2>

                {% for option in mcq.options %}

                <label class="option">

                    <input

                        type="radio"

                        name="q{{ question_number }}"

                        value="{{ loop.index }}"

                        required
                    >

                    <span class="option-text">

                        {{ option }}

                    </span>

                </label>

                {% endfor %}

            </div>

            {% endfor %}

            <!-- SUBMIT -->

            <button
                type="submit"
                class="submit-btn"
            >

                🚀 Submit Test

            </button>

        </form>

    </div>

</body>
</html>
