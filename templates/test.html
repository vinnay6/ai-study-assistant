<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Test</title>

    <!-- GOOGLE FONT -->

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- EXTERNAL CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- TEST PAGE -->

    <div class="test-page">

        <div class="test-card">

            <!-- TOP BAR -->

            <div class="top-bar">

                <h1 class="title">

                    📝 AI Generated Test

                </h1>

                <a href="/dashboard"
                   class="back-btn">

                    ← Back to Dashboard

                </a>

            </div>

            <!-- TEST FORM -->

            <form action="/submit-test"
                  method="POST"
                  class="test-form">

                {% for mcq in mcqs %}

                {% set question_number = loop.index %}

                <!-- QUESTION CARD -->

                <div class="question-box glass">

                    <h2 class="question">

                        Q{{ question_number }}.
                        {{ mcq.question }}

                    </h2>

                    <!-- OPTIONS -->

                    <div class="options-list">

                        {% for option in mcq.options %}

                        <label class="option">

                            <input
                                type="radio"
                                name="q{{ question_number }}"
                                value="{{ loop.index }}"
                                required>

                            <span class="option-text">

                                {{ option }}

                            </span>

                        </label>

                        {% endfor %}

                    </div>

                </div>

                {% endfor %}

                <!-- SUBMIT BUTTON -->

                <button
                    type="submit"
                    class="submit-btn">

                    🚀 Submit Test

                </button>

            </form>

        </div>

    </div>

</body>

</html>
